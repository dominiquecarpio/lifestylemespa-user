<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifestyle Medical Spa</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/Finesse Logo.png">
    <meta name="theme-color" content="#c9a96e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finesse Spa">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --gold-dark: #9a7a4a;
            --cream: #faf6f0;
            --dark: #000000;
        }

        body {
            background: var(--dark);
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        #intro {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: var(--dark);
        }

        /* Particle canvas */
        #particles {
            position: absolute;
            inset: 0;
            opacity: 0;
            animation: fadeIn 1.2s ease 0.3s forwards;
        }

        /* Radial glow */
        .glow-ring {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(ellipse at center,
                    rgba(201, 169, 110, 0.12) 0%,
                    rgba(201, 169, 110, 0.04) 50%,
                    transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards, glowPulse 3s ease-in-out 1.5s infinite;
        }

        /* Ornamental top & bottom lines */
        .ornament {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
        }

        .ornament.top {
            top: calc(50% - 180px);
            animation: fadeSlideDown 0.8s ease 1.2s forwards;
        }

        .ornament.bottom {
            bottom: calc(50% - 180px);
            animation: fadeSlideUp 0.8s ease 1.4s forwards;
        }

        .ornament-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }

        .ornament.bottom .ornament-line {
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .ornament-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold);
        }

        .ornament-diamond {
            width: 7px;
            height: 7px;
            background: var(--gold);
            transform: rotate(45deg);
            box-shadow: 0 0 10px var(--gold);
        }

        /* Logo container */
        .logo-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* SVG logo mark */
        .logo-svg {
            width: 280px;
            height: 280px;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.75) translateY(20px);
            animation: logoReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
            filter: drop-shadow(0 0 30px rgba(201, 169, 110, 0.35));
        }

        /* Text */
        /* Divider */
        .divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto;
            animation: expandLine 0.8s ease 1.5s forwards;
        }

        /* Tagline */
        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 13px;
            color: var(--gold-light);
            letter-spacing: 3px;
            opacity: 0;
            animation: textReveal 0.8s ease 1.8s forwards;
        }

        /* Progress bar */
        .progress-wrap {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 0.6s ease 1.2s forwards;
        }

        .progress-track {
            width: 160px;
            height: 1px;
            background: rgba(201, 169, 110, 0.2);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
            animation: loadBar 2.2s cubic-bezier(0.4, 0, 0.2, 1) 1.4s forwards;
            box-shadow: 0 0 8px var(--gold);
        }

        .progress-label {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(201, 169, 110, 0.5);
            text-transform: uppercase;
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0;
        }

        .corner.tl {
            top: 40px;
            left: 40px;
            border-top: 1px solid var(--gold);
            border-left: 1px solid var(--gold);
            animation: fadeIn 0.8s ease 1.8s forwards;
        }

        .corner.tr {
            top: 40px;
            right: 40px;
            border-top: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
            animation: fadeIn 0.8s ease 1.9s forwards;
        }

        .corner.bl {
            bottom: 40px;
            left: 40px;
            border-bottom: 1px solid var(--gold);
            border-left: 1px solid var(--gold);
            animation: fadeIn 0.8s ease 2.0s forwards;
        }

        .corner.br {
            bottom: 40px;
            right: 40px;
            border-bottom: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
            animation: fadeIn 0.8s ease 2.1s forwards;
        }

        /* Exit animation */
        #intro.exiting {
            animation: exitIntro 0.9s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes fadeSlideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ornament.top {
            transform: translateY(-10px);
        }

        .ornament.bottom {
            transform: translateY(10px);
        }

        @keyframes logoReveal {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandLine {
            to {
                width: 200px;
            }
        }

        @keyframes loadBar {
            0% {
                width: 0;
            }

            60% {
                width: 75%;
            }

            100% {
                width: 100%;
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        @keyframes drawPath {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes exitIntro {
            0% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }

            100% {
                opacity: 0;
                clip-path: inset(0 0 100% 0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -400px 0;
            }

            100% {
                background-position: 400px 0;
            }
        }
    </style>
</head>

<body>

    <div id="intro">
        <canvas id="particles"></canvas>
        <div class="glow-ring"></div>

        <!-- Ornaments -->
        <div class="ornament top">
            <div class="ornament-line" style="background: linear-gradient(90deg, transparent, var(--gold))"></div>
            <div class="ornament-dot"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-dot"></div>
            <div class="ornament-line" style="background: linear-gradient(90deg, var(--gold), transparent)"></div>
        </div>

        <div class="logo-wrap">
            <img src="images/Finesse Logo.png" class="logo-svg" alt="Lifestyle Medical Spa" />
        </div>

        <div class="ornament bottom">
            <div class="ornament-line"></div>
            <div class="ornament-dot"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-dot"></div>
            <div class="ornament-line" style="background: linear-gradient(90deg, transparent, var(--gold))"></div>
        </div>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-label">Preparing your experience</div>
        </div>

        <!-- Corner accents -->
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <script>
        // Particle system
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = Array.from({ length: 60 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.4 + 0.3,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -Math.random() * 0.4 - 0.1,
            alpha: Math.random() * 0.5 + 0.1,
            pulse: Math.random() * Math.PI * 2
        }));

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.pulse += 0.02;
                p.alpha = (Math.sin(p.pulse) * 0.25 + 0.35);
                p.x += p.vx; p.y += p.vy;
                if (p.y < -5) p.y = canvas.height + 5;
                if (p.x < -5) p.x = canvas.width + 5;
                if (p.x > canvas.width + 5) p.x = -5;
                ctx.beginPath();
                ctx.arc(p.x, p.y,   p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(201,169,110,${p.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // Auto-exit after load bar completes
        setTimeout(() => {
            document.getElementById('intro').classList.add('exiting');
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                window.location.href = 'home.html';
            }, 900);
        }, 3800);
    </script>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('js/service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
